<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Faceted Frames</title>
    <meta
      name="description"
      content="Official Faceted Frames Website"
    />
    <link rel="icon" type="image/jpeg" href="assets/fflogo.jpg" />
    <link rel="stylesheet" href="styles.css?v=20260613" />
  </head>
  <body>
    <header class="site-header">
      <a class="header-logo-link" href="#top" aria-label="Back to top">
        <img class="header-banner" src="assets/fftextlogo.PNG" alt="Faceted Frames logo" />
      </a>
      <div class="header-overlay">
        <div class="topbar-left">
          <a class="top-link contact-link" href="#bottom">
            <img class="nav-image nav-image-contact" src="assets/contacticongold.png" alt="Contact" />
          </a>
        </div>
        <div class="header-right">
          <div class="desktop-socials desktop-socials--right" aria-label="Social links">
            <a class="desktop-social-link" href="https://www.youtube.com/@facetedframes" target="_blank" rel="noreferrer" aria-label="YouTube">
              <img src="assets/youtubegold.png" alt="" />
            </a>
            <a class="desktop-social-link" href="https://www.facebook.com/profile.php?id=61569752854311&ref=NONE_xav_ig_profile_page_web" target="_blank" rel="noreferrer" aria-label="Facebook">
              <img src="assets/FBgold.png" alt="" />
            </a>
            <a class="desktop-social-link" href="https://www.instagram.com/facetedframes/" target="_blank" rel="noreferrer" aria-label="Instagram">
              <img src="assets/instagramgold.png" alt="" />
            </a>
          </div>
          <a class="top-link shop-link" href="gallery/index.html">
            <img class="nav-image nav-image-gallery" src="assets/galleryiocngold.png" alt="Gallery" />
          </a>
        </div>
      </div>
      <nav class="mobile-subheader" aria-label="Social links">
        <a class="mobile-subheader-link" href="https://www.instagram.com/facetedframes/" target="_blank" rel="noreferrer" aria-label="Instagram">
          <img src="assets/instagramgold.png" alt="" />
        </a>
        <a class="mobile-subheader-link" href="https://www.youtube.com/@facetedframes" target="_blank" rel="noreferrer" aria-label="YouTube">
          <img src="assets/youtubegold.png" alt="" />
        </a>
        <a class="mobile-subheader-link" href="https://www.facebook.com/profile.php?id=61569752854311&ref=NONE_xav_ig_profile_page_web" target="_blank" rel="noreferrer" aria-label="Facebook">
          <img src="assets/FBgold.png" alt="" />
        </a>
      </nav>
    </header>

    <main id="top">
      <section class="hero" aria-label="Faceted Frames introduction">
        <div class="hero-overlay"></div>
        <div class="hero-content">
          <h1 class="hero-title">
            <img class="hero-title-image" src="assets/ffhometext.png" alt="Faceted Frames" />
          </h1>
          <p class="hero-subtitle">
            Bespoke one-of-one pieces,
            <br />
            made with care and attention to detail.
          </p>
          <a class="hero-button" href="gallery/index.html#gallery-collection">Explore the gallery</a>
        </div>
      </section>

      <section id="contact" class="contact-section">
        <div class="section-shell">
          <p class="eyebrow">Contact</p>
          <div class="contact-actions">
            <div class="contact-pair">
              <div class="contact-item">
                <p class="contact-item-title">Commissions, Inquires,<br />and Questions</p>
                <a class="contact-email-button" href="mailto:facetedframes@gmail.com?subject=Commissions">
                  General Correspondence
                </a>
              </div>
              <div class="contact-item">
                <p class="contact-item-title">Curating Exhibitions<br />and Events</p>
                <a class="contact-email-button" href="mailto:facetedframesvending@gmail.com?subject=Vending">
                  Curation<br />Proposals
                </a>
              </div>
            </div>
          </div>
        </div>
      </section>
      <div id="bottom" aria-hidden="true"></div>
    </main>
  </body>
</html>
