<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Faceted Frames | Gallery</title>
    <meta
      name="description"
      content="Explore the Faceted Frames gallery of one-of-one handmade jewelry pieces."
    />
    <link rel="icon" type="image/jpeg" href="../assets/fflogo.jpg" />
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body class="gallery-page">
    <header class="site-header">
      <a class="header-logo-link" href="#top" aria-label="Back to top">
        <img class="header-banner" src="../assets/fftextlogo.PNG" alt="Faceted Frames logo" />
      </a>
      <div class="header-overlay">
        <div class="topbar-left">
          <a class="top-link contact-link" href="#bottom">
            <img class="nav-image nav-image-contact" src="../assets/contacticongold.png" alt="Contact" />
          </a>
        </div>
        <a class="top-link shop-link" href="../index.html">
          <img class="nav-image nav-image-home" src="../assets/homeicongold.png" alt="Home" />
        </a>
      </div>
    </header>

    <main id="top">
      <section class="hero gallery-hero">
        <div class="hero-content">
          <h1>Gallery</h1>
          <p class="hero-subtitle">
            A curated collection of unique pieces,
            <br />
            made to be explored up close.
          </p>
          <a class="hero-button" href="#gallery-collection">Browse the gallery</a>
        </div>
      </section>

      <section id="gallery-collection" class="content-section section-frame gallery-section">
        <div class="gallery-grid" aria-label="Gallery collection"></div>
      </section>

      <section id="contact" class="contact-section">
        <div class="section-shell">
          <p class="eyebrow">Contact</p>
          <h2>DM on Instagram</h2>
          <p class="section-copy">
            For commissions, custom requests, or questions, reach out on Instagram.
          </p>
          <div class="contact-actions">
            <a
              class="cta-icon large"
              href="https://www.instagram.com/facetedframes/"
              target="_blank"
              rel="noreferrer"
              aria-label="Instagram"
            >
              <img src="../assets/instagram.png" alt="" />
            </a>
            <div class="contact-row">
              <a
                class="cta-icon small"
                href="https://www.youtube.com/@facetedframes"
                target="_blank"
                rel="noreferrer"
                aria-label="YouTube"
              >
                <img src="../assets/youtube.webp" alt="" />
              </a>
              <a
                class="cta-icon small"
                href="https://www.facebook.com/profile.php?id=61569752854311&ref=NONE_xav_ig_profile_page_web"
                target="_blank"
                rel="noreferrer"
                aria-label="Facebook"
              >
                <img src="../assets/facebook.png" alt="" />
              </a>
            </div>
          </div>
        </div>
      </section>
      <div id="bottom" aria-hidden="true"></div>
    </main>

      const galleryGrid = document.querySelector(".gallery-grid");

      const galleryImages = Array.isArray(window.galleryImages) && window.galleryImages.length
        ? window.galleryImages
        : fallbackGalleryImages;

      function makeThumbnailSource(source) {
        if (typeof source !== "string" || !source.includes("res.cloudinary.com")) {
          return source;
        }

        return source.replace("/upload/", "/upload/f_auto,q_auto,w_700/");
      }

      galleryGrid.innerHTML = galleryImages
        .map((source) => {
          const resolved = new URL(source, document.baseURI).href;
          const thumbnailSource = makeThumbnailSource(resolved);
          return `
            <a class="gallery-card" href="${resolved}" target="_blank" rel="noreferrer">
              <img src="${thumbnailSource}" alt="" loading="lazy" decoding="async" fetchpriority="low" />
            </a>
          `;
        })
        .join("");
