      const gallerySectionsRoot = document.querySelector(".gallery-sections");
      const sectionMenus = Array.from(document.querySelectorAll(".section-menu-toggle"))
        .map((toggle) => {
          const menuRoot = toggle.closest(".desktop-section-menu, .mobile-section-menu");
          const panel = menuRoot ? menuRoot.querySelector(".section-menu-panel") : null;
          return menuRoot && panel ? { root: menuRoot, toggle, panel, closeTimer: null } : null;
        })
        .filter(Boolean);
      const sectionDefinitions = [
        { key: "signature-pieces", label: "Signature Pieces", aliases: ["main", "signature", "signature pieces"] },
        { key: "featured-designs", label: "Featured Designs", aliases: ["featured", "featured designs"] },
        { key: "production-lines", label: "Production Lines", aliases: ["production", "production lines", "production-line", "line", "lines"] },
        { key: "previous-commissions", label: "Previous Commissions", aliases: ["commission", "commissions", "previous commission", "previous commissions"] },
        {
          key: "lapidary-solutions",
          label: "Lapidary Solutions",
          aliases: ["lapidary", "lapidary-solutions", "lapidary solutions", "solutions"],
        },
        {
          key: "curation-events",
          label: "Curation Events",
          aliases: ["curation", "curation events", "event", "events", "vending"],
        },
      ];

      function toSlug(value) {
        return String(value || "")
          .toLowerCase()
          .trim()
          .replace(/[^a-z0-9]+/g, "-")
          .replace(/^-+|-+$/g, "");
      }

      function stripNumericPrefix(value) {
        return String(value || "")
          .replace(/^\s*\d+\s*/, "")
          .trim();
      }

      function normalizeSectionToken(value) {
        return toSlug(stripNumericPrefix(value));
      }

      function humanize(value) {
        const compact = String(value || "")
          .replace(/[-_]+/g, " ")
          .replace(/\s+/g, " ")
          .trim();

        if (!compact) {
          return "Gallery";
        }

        return compact.replace(/(^|\s)\S/g, (character) => character.toUpperCase());
      }

      function extractCloudinaryInfo(source) {
        try {
          const url = new URL(source, document.baseURI);
          const uploadIndex = url.pathname.indexOf("/upload/");

          if (uploadIndex === -1) {
            return null;
          }

          const parts = url.pathname
            .slice(uploadIndex + "/upload/".length)
            .split("/")
            .filter(Boolean);

          if (!parts.length) {
            return null;
          }

          const versionIndex = parts[0] && /^v\d+$/.test(parts[0]) ? 1 : 0;
          const resolvedParts = parts.slice(versionIndex);

          if (!resolvedParts.length) {
            return null;
          }

          return {
            folder: resolvedParts.slice(0, -1).join("/"),
            fileName: resolvedParts[resolvedParts.length - 1],
          };
        } catch {
          return null;
        }
      }

      function inferTagsFromName(fileName) {
        const lowerName = String(fileName || "").toLowerCase();
        const tags = [];

        if (lowerName.includes("featured")) {
          tags.push("featured");
        }

        if (lowerName.includes("pendant")) {
          tags.push("pendants");
        }

        if (lowerName.includes("photoroom")) {
          tags.push("studio");
        }

        return tags;
      }

      function normalizeAsset(source) {
        if (typeof source === "string") {
          const resolvedUrl = new URL(source, document.baseURI).href;
          const cloudinaryInfo = extractCloudinaryInfo(resolvedUrl);
          const fileName = cloudinaryInfo?.fileName || resolvedUrl.split("/").pop() || "";

        return {
          url: resolvedUrl,
          folder: cloudinaryInfo?.folder || "",
          tags: inferTagsFromName(fileName),
          label: stripNumericPrefix(humanize(fileName.replace(/\.[^.]+$/, ""))),
        };
        }

        if (!source || typeof source !== "object") {
          return null;
        }

        const resolvedUrl = source.secure_url || source.url || source.src || "";
        const safeUrl = resolvedUrl ? new URL(resolvedUrl, document.baseURI).href : "";
        const cloudinaryInfo = extractCloudinaryInfo(safeUrl);
        const folder = String(source.asset_folder || source.folder || cloudinaryInfo?.folder || "").trim();
        const tags = Array.isArray(source.tags) ? source.tags : [];
        const fileName = source.public_id?.split("/").pop() || cloudinaryInfo?.fileName || safeUrl.split("/").pop() || "";

        return {
          url: safeUrl,
          folder,
          tags: tags.map(toSlug).filter(Boolean),
          label: stripNumericPrefix(source.title || humanize(fileName.replace(/\.[^.]+$/, ""))),
        };
      }

      function sectionLabelFromKey(key) {
        if (!key) {
          return "Gallery";
        }

        const matchedDefinition = sectionDefinitions.find((definition) => definition.key === key);

        if (matchedDefinition) {
          return matchedDefinition.label;
        }

        const normalizedKey = stripNumericPrefix(key);
        return normalizedKey.includes("/")
          ? normalizedKey.split("/").map((part) => humanize(stripNumericPrefix(part))).join(" / ")
          : humanize(normalizedKey);
      }

      function makeThumbnailSource(source) {
        if (typeof source !== "string" || !source.includes("res.cloudinary.com")) {
          return source;
        }

        return source.replace("/upload/", "/upload/f_auto,q_auto,w_700/");
      }

      function isFeaturedItem(item) {
        const searchable = [
          item?.label,
          item?.title,
          item?.name,
          item?.public_id,
          item?.folder,
          item?.url,
        ]
          .map(normalizeSectionToken)
          .join(" ");

        return searchable.includes("featured");
      }

      function normalizeLegacyGallerySections(rawSections) {
        const sections = new Map(sectionDefinitions.map((definition) => [
          definition.key,
          {
            key: definition.key,
            label: definition.label,
            items: [],
          },
        ]));

        for (const section of rawSections) {
          const sectionKey = normalizeSectionToken(section.key || section.id || section.label || section.title || "");
          const items = (section.items || section.images || section.assets || [])
            .map(normalizeAsset)
            .filter((item) => item && item.url);

          if (sectionKey === "main") {
            for (const item of items) {
              const targetKey = isFeaturedItem(item) ? "featured-designs" : "signature-pieces";
              sections.get(targetKey).items.push(item);
            }
            continue;
          }

          const remappedKey =
            sectionKey === "commissions"
              ? "previous-commissions"
              : sectionKey === "vending"
                ? "curation-events"
                : sectionKey;

          if (sections.has(remappedKey)) {
            sections.get(remappedKey).items.push(...items);
          }
        }

        return sectionDefinitions.map((definition) => sections.get(definition.key));
      }

      function buildSections(rawItems) {
        const sections = new Map(sectionDefinitions.map((definition) => [
          definition.key,
          {
            key: definition.key,
            label: definition.label,
            items: [],
          },
        ]));
        const items = rawItems.map(normalizeAsset).filter((item) => item && item.url);

        for (const item of items) {
          const sectionKeys = new Set();
          const searchableParts = [
            item.folder,
            ...String(item.folder || "").split("/"),
            ...item.tags,
          ]
            .map(normalizeSectionToken)
            .filter(Boolean);

          for (const definition of sectionDefinitions) {
            const aliases = [definition.key, definition.label, ...(definition.aliases || [])].map(normalizeSectionToken);
            if (searchableParts.some((part) => aliases.includes(part))) {
              sectionKeys.add(definition.key);
            }
          }

          for (const sectionKey of sectionKeys) {
            sections.get(sectionKey).items.push(item);
          }
        }

        return sectionDefinitions.map((definition) => sections.get(definition.key));
      }

      function renderSection(section, index) {
        const sectionId = `gallery-section-${toSlug(section.key) || index + 1}`;
        const previewCount = section.items.length;

        return `
          <section class="gallery-section-block" id="${sectionId}">
            <div class="gallery-section-header">
              <div class="gallery-section-header-copy">
                <h3>${section.label}</h3>
                <span class="gallery-section-count">${previewCount} image${previewCount === 1 ? "" : "s"}</span>
              </div>
            </div>
            <div class="gallery-grid">
              ${section.items
                .map((item) => {
                  const thumbnailSource = makeThumbnailSource(item.url);
                  return `
                    <a class="gallery-card" href="${item.url}" target="_blank" rel="noreferrer" aria-label="${item.label}">
                      <img src="${thumbnailSource}" alt="${item.label}" loading="lazy" decoding="async" fetchpriority="low" />
                    </a>
                  `;
                })
                .join("")}
            </div>
          </section>
        `;
      }

      function scrollToSection(sectionId, behavior = "smooth") {
        const target = document.getElementById(sectionId);

        if (!target) {
          return;
        }

        const header = document.querySelector(".site-header");
        const headerHeight = header ? header.getBoundingClientRect().height : 0;
        const targetTop = target.getBoundingClientRect().top + window.scrollY - headerHeight;

        window.scrollTo({
          top: Math.max(0, targetTop),
          behavior,
        });
      }

      function closeSectionMenu() {
        for (const menu of sectionMenus) {
          if (menu.closeTimer) {
            window.clearTimeout(menu.closeTimer);
            menu.closeTimer = null;
          }

          menu.toggle.setAttribute("aria-expanded", "false");
          menu.toggle.classList.remove("is-open");
          menu.panel.classList.remove("is-open");
          menu.panel.setAttribute("aria-hidden", "true");
          menu.closeTimer = window.setTimeout(() => {
            menu.panel.hidden = true;
            menu.closeTimer = null;
          }, 220);
        }
      }

      function openSectionMenu(menu) {
        if (!menu) {
          return;
        }

        if (menu.closeTimer) {
          window.clearTimeout(menu.closeTimer);
          menu.closeTimer = null;
        }

        menu.panel.hidden = false;
        menu.panel.setAttribute("aria-hidden", "false");
        requestAnimationFrame(() => {
          menu.panel.classList.add("is-open");
          menu.toggle.classList.add("is-open");
          menu.toggle.setAttribute("aria-expanded", "true");
        });
      }

      const rawGalleryData = Array.isArray(window.gallerySections)
        ? window.gallerySections
        : Array.isArray(window.galleryImages)
          ? window.galleryImages
          : fallbackGalleryImages;

      const sections = Array.isArray(rawGalleryData) && rawGalleryData.length
        ? (
            typeof rawGalleryData[0] === "object" &&
            !Array.isArray(rawGalleryData[0]) &&
            ("items" in rawGalleryData[0] || "images" in rawGalleryData[0] || "assets" in rawGalleryData[0])
              ? normalizeLegacyGallerySections(
                  rawGalleryData.filter((section) => normalizeSectionToken(section.key || section.id || section.label || section.title || "") !== "removed"),
                )
              : buildSections(rawGalleryData)
        )
        : [];

      if (!sections.length) {
        for (const menu of sectionMenus) {
          menu.panel.innerHTML = "";
        }
        gallerySectionsRoot.innerHTML = "<p class=\"section-copy\">No gallery images found yet.</p>";
      } else {
        const sectionLinksMarkup = sections
          .map((section, index) => {
            const targetId = `gallery-section-${toSlug(section.key) || index + 1}`;
            const label = stripNumericPrefix(section.label);
            return `<a class="section-pill" href="#${targetId}" data-target="${targetId}">${label}</a>`;
          })
          .join("");

        for (const menu of sectionMenus) {
          menu.panel.innerHTML = sectionLinksMarkup;
        }

        gallerySectionsRoot.innerHTML = sections.map(renderSection).join("");

        document.querySelectorAll(".section-menu-panel .section-pill").forEach((pill) => {
          pill.addEventListener("click", (event) => {
            const targetId = pill.getAttribute("data-target");

            if (!targetId) {
              return;
            }

            event.preventDefault();
            history.replaceState(null, "", `#${targetId}`);
            closeSectionMenu();
            scrollToSection(targetId);
          });
        });

        if (location.hash) {
          const targetId = location.hash.slice(1);
          requestAnimationFrame(() => scrollToSection(targetId, "auto"));
        }

        for (const menu of sectionMenus) {
          menu.toggle.addEventListener("click", (event) => {
            event.preventDefault();
            event.stopPropagation();
            const expanded = menu.toggle.getAttribute("aria-expanded") === "true";

            if (expanded) {
              closeSectionMenu();
            } else {
              openSectionMenu(menu);
            }
          });

          menu.panel.addEventListener("click", (event) => {
            event.stopPropagation();
          });
        }
      }
